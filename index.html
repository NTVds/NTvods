<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vods - Solicitar Conteúdo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .step {
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }

    .step:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .step-number {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-size: 14px;
      font-weight: bold;
      margin-right: 10px;
    }

    .step-title {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e1e5e9;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-success {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    }

    .results-list {
      margin-top: 15px;
      max-height: 400px;
      overflow-y: auto;
    }

    .result-item {
      background: #f8f9fa;
      border: 2px solid #e1e5e9;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      gap: 15px;
    }

    .result-item:hover {
      border-color: #667eea;
      background: #f0f2ff;
      transform: translateX(5px);
    }

    .result-item img {
      width: 70px;
      height: 105px;
      object-fit: cover;
      border-radius: 8px;
    }

    .result-info {
      flex: 1;
    }

    .result-title {
      font-weight: bold;
      font-size: 16px;
      color: #333;
      margin-bottom: 5px;
    }

    .result-year {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }

    .result-overview {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .selected-content {
      background: #e8f5e9;
      border: 2px solid #4caf50;
      border-radius: 12px;
      padding: 15px;
      margin-top: 15px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .selected-content img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .selected-content-info {
      flex: 1;
    }

    .selected-content-title {
      font-weight: bold;
      font-size: 18px;
      color: #2e7d32;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
      text-align: center;
      font-weight: bold;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .message.loading {
      background: #e2e3e5;
      color: #383d41;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📺</div>
      <h1>Solicitar Conteúdo</h1>
      <div class="subtitle">Sugira filmes, séries ou canais para adicionarmos</div>
    </div>

    <div class="card">
      <!-- PASSO 1: Nome do Conteúdo -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">1</span>
          Nome do Conteúdo
        </div>
        <input type="text" id="titulo" placeholder="Ex: Breaking Bad, Interestelar, ESPN...">
      </div>

      <!-- PASSO 2: Buscar via TMDB -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">2</span>
          Buscar no TMDB
        </div>
        <button id="buscarBtn" onclick="buscarConteudo()">🔍 Buscar Conteúdo</button>
        <div id="resultadosBusca" class="results-list"></div>
      </div>

      <!-- PASSO 3: Conteúdo Selecionado -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">3</span>
          Conteúdo Selecionado
        </div>
        <div id="conteudoSelecionado" class="selected-content hidden"></div>
      </div>

      <!-- PASSO 4: Observação -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">4</span>
          Observação (opcional)
        </div>
        <textarea id="obs" placeholder="Alguma informação adicional..."></textarea>
      </div>

      <!-- PASSO 5: Enviar Pedido -->
      <div class="step">
        <div class="step-title">
          <span class="step-number">5</span>
          Enviar Pedido
        </div>
        <button id="enviarBtn" class="btn-success" onclick="enviarPedido()" disabled>📤 Enviar Pedido</button>
      </div>

      <!-- MENSAGEM -->
      <div id="message" class="message"></div>
    </div>

    <div class="footer">
      <p>Seu pedido será analisado pela nossa equipe</p>
    </div>
  </div>

  <script>
    const API_KEY_TMDB = 'eb93e716b56767d9b0e6d4fdcf25a511';
    
    // CONFIGURAÇÕES DO JSONBIN - ATUALIZADAS
    const JSONBIN_BIN_ID = '69c4bfc7aa77b81da91e4ade';
    const JSONBIN_API_KEY = '$2a$10$bhMtAwcf3dyReoB6vVQI/OXfcGowi64jAhcdUiQtGUwF6LukGD/3u';

    let conteudoSelecionado = null;
    let resultadosAtuais = [];

    async function buscarConteudo() {
      const titulo = document.getElementById('titulo').value.trim();
      const buscarBtn = document.getElementById('buscarBtn');
      const resultadosDiv = document.getElementById('resultadosBusca');

      if (!titulo) {
        mostrarMensagem('Por favor, digite o nome do conteúdo!', 'error');
        return;
      }

      conteudoSelecionado = null;
      document.getElementById('conteudoSelecionado').classList.add('hidden');
      document.getElementById('enviarBtn').disabled = true;

      buscarBtn.disabled = true;
      buscarBtn.textContent = '⏳ Buscando...';
      
      resultadosDiv.innerHTML = '<div style="text-align: center; padding: 20px;"><span class="spinner"></span> Buscando conteúdo...</div>';

      try {
        const url = `https://api.themoviedb.org/3/search/multi?api_key=${API_KEY_TMDB}&query=${encodeURIComponent(titulo)}&language=pt-BR`;
        
        const response = await fetch(url);
        const data = await response.json();
        
        const resultados = data.results.filter(item => 
          (item.media_type === 'movie' || item.media_type === 'tv') && 
          (item.title || item.name)
        ).slice(0, 5);
        
        resultadosAtuais = resultados;

        if (resultados.length > 0) {
          resultadosDiv.innerHTML = resultados.map((item, index) => {
            const tituloItem = item.title || item.name;
            const ano = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : '');
            const sinopse = item.overview ? item.overview.substring(0, 100) : 'Sem descrição';
            const imagem = item.poster_path ? `https://image.tmdb.org/t/p/w200${item.poster_path}` : null;
            const tipo = item.media_type === 'movie' ? '🎥 Filme' : '📺 Série';
            
            return `
              <div class="result-item" onclick="selecionarConteudo(${index})">
                ${imagem ? `<img src="${imagem}" alt="${tituloItem}">` : '<div style="width:70px;height:105px;background:#e1e5e9;border-radius:8px;display:flex;align-items:center;justify-content:center;">📺</div>'}
                <div class="result-info">
                  <div class="result-title">${escapeHtml(tituloItem)}</div>
                  <div class="result-year">${tipo} ${ano ? `• ${ano}` : ''}</div>
                  <div class="result-overview">${escapeHtml(sinopse)}${sinopse.length >= 100 ? '...' : ''}</div>
                </div>
              </div>
            `;
          }).join('');
        } else {
          resultadosDiv.innerHTML = `
            <div style="background: #fff3cd; border-radius: 10px; padding: 15px; text-align: center;">
              <p style="color: #856404;">⚠️ Nenhum resultado encontrado.</p>
              <p style="font-size: 13px; margin-top: 5px;">Você pode adicionar manualmente clicando no botão abaixo:</p>
              <button onclick="adicionarManual()" style="margin-top: 10px; background: #6c757d; padding: 8px;">➕ Adicionar Manualmente</button>
            </div>
          `;
        }
      } catch (error) {
        console.error('Erro:', error);
        resultadosDiv.innerHTML = '<div style="background: #f8d7da; border-radius: 10px; padding: 15px; text-align: center; color: #721c24;">❌ Erro ao buscar. Verifique sua conexão.</div>';
      } finally {
        buscarBtn.disabled = false;
        buscarBtn.textContent = '🔍 Buscar Conteúdo';
      }
    }

    function selecionarConteudo(index) {
      const item = resultadosAtuais[index];
      const tipo = item.media_type === 'movie' ? 'Filme' : 'Série';
      const tituloItem = item.title || item.name;
      const ano = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : '');
      const imagem = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : null;
      
      conteudoSelecionado = {
        id: item.id,
        nome: tituloItem,
        tipo: tipo,
        imagem: imagem,
        ano: ano
      };
      
      const selectedDiv = document.getElementById('conteudoSelecionado');
      selectedDiv.innerHTML = `
        ${imagem ? `<img src="${imagem}" alt="${tituloItem}">` : '<div style="width:80px;height:120px;background:#e1e5e9;border-radius:8px;display:flex;align-items:center;justify-content:center;">📺</div>'}
        <div class="selected-content-info">
          <div class="selected-content-title">${escapeHtml(tituloItem)}</div>
          <div style="color: #666; margin-top: 5px;">${tipo} ${ano ? `• ${ano}` : ''}</div>
        </div>
        <button onclick="limparSelecao()" style="width: auto; padding: 8px 15px; background: #dc3545;">✖️</button>
      `;
      selectedDiv.classList.remove('hidden');
      
      document.getElementById('enviarBtn').disabled = false;
      selectedDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function adicionarManual() {
      const titulo = document.getElementById('titulo').value.trim();
      
      if (!titulo) {
        mostrarMensagem('Digite o nome do conteúdo!', 'error');
        return;
      }
      
      conteudoSelecionado = {
        id: Date.now(),
        nome: titulo,
        tipo: 'Filme',
        imagem: null,
        ano: null
      };
      
      const selectedDiv = document.getElementById('conteudoSelecionado');
      selectedDiv.innerHTML = `
        <div style="width:80px;height:120px;background:#e1e5e9;border-radius:8px;display:flex;align-items:center;justify-content:center;">📺</div>
        <div class="selected-content-info">
          <div class="selected-content-title">${escapeHtml(titulo)}</div>
          <div style="color: #666; margin-top: 5px;">Adicionado manualmente</div>
        </div>
        <button onclick="limparSelecao()" style="width: auto; padding: 8px 15px; background: #dc3545;">✖️</button>
      `;
      selectedDiv.classList.remove('hidden');
      
      document.getElementById('enviarBtn').disabled = false;
      
      mostrarMensagem('✅ Conteúdo adicionado manualmente! Agora envie o pedido.', 'success');
    }

    function limparSelecao() {
      conteudoSelecionado = null;
      document.getElementById('conteudoSelecionado').classList.add('hidden');
      document.getElementById('enviarBtn').disabled = true;
      document.getElementById('message').className = 'message';
      document.getElementById('message').innerHTML = '';
    }

    async function enviarPedido() {
      if (!conteudoSelecionado) {
        mostrarMensagem('Por favor, selecione um conteúdo antes de enviar!', 'error');
        return;
      }

      const obs = document.getElementById('obs').value.trim();
      const enviarBtn = document.getElementById('enviarBtn');
      
      const pedido = {
        id: Date.now(),
        nome: conteudoSelecionado.nome,
        tipo: conteudoSelecionado.tipo,
        imagem: conteudoSelecionado.imagem || '',
        observacoes: obs,
        status: 'pendente',
        data: new Date().toLocaleString('pt-BR'),
        timestamp: Date.now()
      };

      enviarBtn.disabled = true;
      enviarBtn.textContent = '⏳ Enviando...';
      mostrarMensagem('<span class="spinner"></span> Enviando pedido...', 'loading');

      try {
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          method: 'GET',
          headers: {
            'X-Access-Key': JSONBIN_API_KEY
          }
        });
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        const pedidosAtuais = data.record.pedidos || [];
        pedidosAtuais.unshift(pedido);
        
        const saveResponse = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Access-Key': JSONBIN_API_KEY
          },
          body: JSON.stringify({ pedidos: pedidosAtuais })
        });
        
        if (!saveResponse.ok) {
          throw new Error(`Erro ao salvar: ${saveResponse.status}`);
        }

        document.getElementById('titulo').value = '';
        document.getElementById('obs').value = '';
        document.getElementById('resultadosBusca').innerHTML = '';
        document.getElementById('conteudoSelecionado').classList.add('hidden');
        conteudoSelecionado = null;
        document.getElementById('enviarBtn').disabled = true;
        
        mostrarMensagem('✅ Pedido enviado com sucesso! Agradecemos sua contribuição.', 'success');
        
        setTimeout(() => {
          document.getElementById('message').className = 'message';
          document.getElementById('message').innerHTML = '';
        }, 5000);
        
      } catch (error) {
        console.error('Erro:', error);
        mostrarMensagem(`❌ Erro ao enviar pedido: ${error.message}`, 'error');
      } finally {
        enviarBtn.disabled = false;
        enviarBtn.textContent = '📤 Enviar Pedido';
      }
    }

    function mostrarMensagem(mensagem, tipo) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = mensagem;
      messageDiv.className = `message ${tipo}`;
      
      if (tipo === 'success') {
        setTimeout(() => {
          if (messageDiv.className === 'message success') {
            messageDiv.className = 'message';
            messageDiv.innerHTML = '';
          }
        }, 5000);
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
