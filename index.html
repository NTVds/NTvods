<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTvods - Solicitar Conteúdo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    h1 {
      color: white;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e1e5e9;
      border-radius: 10px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
    }

    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    .result.loading {
      background: #e2e3e5;
      color: #383d41;
      display: block;
    }

    .preview-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }

    .preview-card img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .preview-card h4 {
      color: #333;
      margin-bottom: 10px;
    }

    .btn-confirm {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">📺</div>
      <h1>Solicitar Conteúdo</h1>
      <div class="subtitle">Sugira filmes, séries ou canais para adicionarmos</div>
    </div>

    <div class="card">
      <div class="form-group">
        <label>🎬 Nome do Conteúdo</label>
        <input type="text" id="titulo" placeholder="Ex: Breaking Bad, Interestelar, ESPN...">
      </div>

      <div class="form-group">
        <label>📌 Tipo</label>
        <select id="tipo">
          <option value="Filme">🎥 Filme</option>
          <option value="Série">📺 Série</option>
          <option value="Canal">📡 Canal</option>
        </select>
      </div>

      <div class="form-group">
        <label>💬 Observações (opcional)</label>
        <textarea id="obs" placeholder="Alguma informação adicional..."></textarea>
      </div>

      <button onclick="buscarConteudo()">🔍 Buscar Informações</button>

      <div id="result" class="result"></div>
    </div>

    <div class="footer">
      <p>Seu pedido será analisado pela nossa equipe</p>
    </div>
  </div>

  <script>
    const API_KEY_TMDB = 'eb93e716b56767d9b0e6d4fdcf25a511';
    
    // CONFIGURAÇÕES DO JSONBIN
    const JSONBIN_BIN_ID = '69c4b50c99b15f1d7836483b';
    const JSONBIN_API_KEY = '$2a$10$X90k.RwHa/rmje766WbM.eWjUYs5MXyU62c8T/Ccaq.k2nczjtjwNy';

    async function buscarConteudo() {
      const titulo = document.getElementById('titulo').value.trim();
      const tipo = document.getElementById('tipo').value;
      const resultDiv = document.getElementById('result');

      if (!titulo) {
        mostrarResultado('Por favor, digite o nome do conteúdo!', 'error');
        return;
      }

      mostrarResultado('<span class="spinner"></span> Buscando informações...', 'loading');

      const searchType = tipo === 'Filme' ? 'movie' : 'tv';
      
      try {
        const response = await fetch(`https://api.themoviedb.org/3/search/${searchType}?api_key=${API_KEY_TMDB}&query=${encodeURIComponent(titulo)}&language=pt-BR`);
        const data = await response.json();

        if (data.results && data.results.length > 0) {
          const item = data.results[0];
          const nome = item.title || item.name;
          const ano = item.release_date ? item.release_date.split('-')[0] : (item.first_air_date ? item.first_air_date.split('-')[0] : '');
          const sinopse = item.overview;
          const imagem = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : null;

          resultDiv.innerHTML = `
            <div class="preview-card">
              <h4>📋 Prévia do Conteúdo</h4>
              <strong>${nome}</strong> ${ano ? `(${ano})` : ''}
              ${sinopse ? `<p style="font-size: 13px; color: #666; margin-top: 8px;">${sinopse.substring(0, 150)}...</p>` : ''}
              ${imagem ? `<img src="${imagem}" alt="${nome}">` : ''}
              <button class="btn-confirm" onclick="confirmarPedido('${nome.replace(/'/g, "\\'")}', '${tipo}', '${imagem || ''}', '${document.getElementById('obs').value.replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                ✅ Confirmar Solicitação
              </button>
            </div>
          `;
          resultDiv.className = 'result';
        } else {
          mostrarResultado('Nenhum resultado encontrado. Você pode adicionar manualmente.', 'error');
          resultDiv.innerHTML += `<button onclick="confirmarPedidoManual()" style="margin-top: 10px;">➕ Adicionar Manualmente</button>`;
        }
      } catch (error) {
        mostrarResultado('Erro ao buscar informações. Tente novamente.', 'error');
      }
    }

    async function confirmarPedido(nome, tipo, imagem, obs) {
      const pedido = {
        id: Date.now(),
        nome: nome,
        tipo: tipo,
        imagem: imagem,
        observacoes: obs,
        status: 'pendente',
        data: new Date().toLocaleString('pt-BR'),
        timestamp: Date.now()
      };

      try {
        // Buscar pedidos existentes
        const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          headers: {
            'X-Master-Key': JSONBIN_API_KEY
          }
        });
        const data = await response.json();
        const pedidosAtuais = data.record.pedidos || [];
        
        // Adicionar novo pedido
        pedidosAtuais.unshift(pedido);
        
        // Salvar no JSONBin
        await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': JSONBIN_API_KEY
          },
          body: JSON.stringify({ pedidos: pedidosAtuais })
        });

        // Limpar formulário
        document.getElementById('titulo').value = '';
        document.getElementById('obs').value = '';
        
        mostrarResultado('✅ Solicitação enviada com sucesso! Agradecemos sua contribuição.', 'success');
        
        setTimeout(() => {
          document.getElementById('result').innerHTML = '';
          document.getElementById('result').className = 'result';
        }, 3000);
        
      } catch (error) {
        console.error('Erro:', error);
        mostrarResultado('❌ Erro ao enviar solicitação. Tente novamente.', 'error');
      }
    }

    async function confirmarPedidoManual() {
      const titulo = document.getElementById('titulo').value.trim();
      const tipo = document.getElementById('tipo').value;
      const obs = document.getElementById('obs').value.trim();
      
      if (!titulo) {
        mostrarResultado('Digite o nome do conteúdo!', 'error');
        return;
      }
      
      await confirmarPedido(titulo, tipo, '', obs);
    }

    function mostrarResultado(mensagem, tipo) {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = mensagem;
      resultDiv.className = `result ${tipo}`;
    }
  </script>
</body>
  </html>
